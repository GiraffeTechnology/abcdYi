name: block-gpm-merge

on:
  pull_request:
    branches: [main]

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Reject legacy GPM service branch by name
        if: contains(github.head_ref, 'giraffe-pricing-model')
        run: |
          echo "::error::Legacy GPM service branch must never merge into main. This check fails by design."
          exit 1

      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reject legacy GPM service code and unsafe patterns
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF" --depth=1
          MERGE_BASE=$(git merge-base "origin/$BASE_REF" HEAD)

          FAILED=0

          # --- Path check ---
          # src/gpm/ is the new approved lightweight local GPM module — allowed.
          # api/routes/gpm.py is the legacy external-service API route — still banned.
          CHANGED_FILES=$(git diff --name-only "$MERGE_BASE" HEAD -- . ':(exclude).github/' || true)

          BANNED_PATHS=(
            "api/routes/gpm\.py"
          )

          for pat in "${BANNED_PATHS[@]}"; do
            if echo "$CHANGED_FILES" | grep -qE "$pat"; then
              echo "::error::PR adds or reintroduces banned legacy GPM path: $pat"
              FAILED=1
            fi
          done

          # --- Legacy external GPM service content check ---
          # These env var names and route strings uniquely identify the old unsafe external service.
          # They are banned anywhere in the diff — no legitimate use exists for them.
          ADDED=$(git diff "$MERGE_BASE" HEAD -- . ':(exclude).github/' \
            | grep '^+' | grep -v '^+++' || true)

          BANNED_LEGACY=(
            "GPM_SERVICE_URL"
            "GPM_SERVICE_API_KEY"
            "/api/gpm"
            "gpm_router"
            "submit_order_to_buffer"
            "push_order_to_gpm_buffer"
          )

          for pat in "${BANNED_LEGACY[@]}"; do
            if echo "$ADDED" | grep -qE "$pat"; then
              echo "::error::PR reintroduces banned legacy GPM service content: $pat"
              FAILED=1
            fi
          done

          # --- Import-level checks scoped to src/gpm/**/*.py production files ---
          #
          # Tests, markdown reports, comments, and docstrings may legitimately mention
          # forbidden provider names (e.g. "dashscope", "openai") to assert those APIs
          # are NOT used. What is banned is actual Python import statements in GPM
          # production source files.
          GPM_CHANGED_PY=$(git diff --name-only "$MERGE_BASE" HEAD -- 'src/gpm/' \
            | grep '\.py$' || true)

          for file in $GPM_CHANGED_PY; do
            ADDED_SRC=$(git diff "$MERGE_BASE" HEAD -- "$file" \
              | grep '^+' | grep -v '^+++' || true)

            # External LLM API imports — banned in src/gpm/ production code
            if echo "$ADDED_SRC" | grep -qiE \
              '^\+[[:space:]]*(import|from)[[:space:]]+(openai|anthropic|dashscope|deepseek)([.[:space:]]|$)'; then
              echo "::error::src/gpm introduces forbidden external LLM import in $file"
              FAILED=1
            fi
            if echo "$ADDED_SRC" | grep -qiE \
              '^\+[[:space:]]*(import|from)[[:space:]]+google\.generativeai([.[:space:]]|$)'; then
              echo "::error::src/gpm introduces forbidden Google Generative AI import in $file"
              FAILED=1
            fi
            if echo "$ADDED_SRC" | grep -qiE \
              '^\+[[:space:]]*from[[:space:]]+google[[:space:]]+import[[:space:]]+generativeai'; then
              echo "::error::src/gpm introduces forbidden Google Generative AI import in $file"
              FAILED=1
            fi

            # Crawler / scraper / browser automation imports — banned in src/gpm/ production code
            if echo "$ADDED_SRC" | grep -qiE \
              '^\+[[:space:]]*(import|from)[[:space:]]+(playwright|selenium|bs4|scrapy|pyppeteer)([.[:space:]]|$)'; then
              echo "::error::src/gpm introduces forbidden crawler/scraper/browser-automation import in $file"
              FAILED=1
            fi

            # Order / payment / dispatch — banned in src/gpm/ production code
            # ^\+[^#]* skips comment lines so docstrings stating what is NOT done do not trip this.
            if echo "$ADDED_SRC" | grep -qiE \
              '^\+[^#]*(place_order|submit_order|payment\.create|cart\.add|send_buyer_quote|dispatch_buyer_quote|auto_quote)'; then
              echo "::error::src/gpm introduces banned order/payment/dispatch behavior in $file"
              FAILED=1
            fi
          done

          # Order / payment / dispatch — also banned in api/**/*.py and skills/**/*.ts
          # Scoped to production code only; markdown and test files are excluded by path.
          for dir_pat in 'api/' 'skills/'; do
            CHANGED_PROD=$(git diff --name-only "$MERGE_BASE" HEAD -- "${dir_pat}" \
              | grep -E '\.(py|ts)$' || true)
            for file in $CHANGED_PROD; do
              ADDED_SRC=$(git diff "$MERGE_BASE" HEAD -- "$file" \
                | grep '^+' | grep -v '^+++' || true)
              if echo "$ADDED_SRC" | grep -qiE \
                '^\+[^#/]*(place_order|submit_order|payment\.create|cart\.add|send_buyer_quote|dispatch_buyer_quote|auto_quote)'; then
                echo "::error::$file introduces banned order/payment/dispatch behavior"
                FAILED=1
              fi
            done
          done

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

          echo "GPM code scan passed — no banned patterns found."
          echo "Approved: src/gpm/ lightweight local module is permitted to merge."
