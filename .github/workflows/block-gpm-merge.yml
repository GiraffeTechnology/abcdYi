name: block-gpm-merge

on:
  pull_request:
    branches: [main]

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Reject GPM branch merge
        if: contains(github.head_ref, 'giraffe-pricing-model')
        run: |
          echo "GPM service branch must never merge into main. This check fails by design."
          exit 1
