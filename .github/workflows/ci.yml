name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    name: Makefile Validation Path
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: giraffe
          POSTGRES_PASSWORD: giraffe
          POSTGRES_DB: apparel_textile
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U giraffe"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://giraffe:giraffe@localhost:5432/apparel_textile
      ALEMBIC_DATABASE_URL: postgresql+psycopg2://giraffe:giraffe@localhost:5432/apparel_textile
      SECRET_KEY: ci-secret-key

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: uv sync
        run: uv sync

      - name: Compile all Python files
        run: uv run python -m compileall .

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v -m "not integration"

      - name: Run Alembic migrations
        run: uv run alembic upgrade head

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v

      - name: Run combined unit + integration tests
        run: uv run pytest tests/unit/ tests/integration/ -v

      - name: BM E2E — DB-off mode
        run: GIRAFFE_DB_MODE=off uv run python run_bm_e2e_with_db.py
